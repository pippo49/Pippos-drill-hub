<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1b1d27">
<title>bashDrill</title>
<style>
  :root{
    --bg:#f3f2ee; --panel:#ffffff; --ink:#1b1d27; --muted:#6b6e7e;
    --line:#e3e1da; --accent:#5b4bd6; --accent-ink:#fff;
    --code-bg:#1b1d27; --code-ink:#e7e6f0; --prompt:#7c83a3;
    --ok:#1f9d6b; --ok-bg:#e6f6ee; --close:#b8821b; --close-bg:#fbf2dd;
    --bad:#cf4040; --bad-bg:#fbe7e7;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#15161d;--panel:#1f212b;--ink:#e7e6f0;--muted:#9296a8;
      --line:#2c2f3b;--code-bg:#0f1016;--ok-bg:#16332a;--close-bg:#3a2f15;--bad-bg:#3a1f1f;}
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.45;-webkit-text-size-adjust:100%;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .wrap{max-width:680px;margin:0 auto;padding:14px 14px 40px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin:4px 2px 14px}
  .logo{font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:-.5px}
  .logo b{color:var(--accent)}
  .stat{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between}
  .eyebrow .topic{color:var(--accent)}
  .qname{font-weight:600;font-size:15px;margin:0 0 12px}
  pre.code{background:var(--code-bg);color:var(--code-ink);font-family:var(--mono);
    font-size:13.5px;line-height:1.55;padding:13px 14px;border-radius:10px;overflow-x:auto;margin:0 0 12px;white-space:pre}
  pre.code .blank{background:rgba(123,131,163,.35);border-radius:3px;padding:0 .35em;color:#fff}
  .prompt{color:var(--prompt)}
  label.lbl{display:block;font-size:13px;color:var(--muted);margin:2px 0 6px}
  textarea,input.ans{width:100%;font-family:var(--mono);font-size:14px;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 11px;resize:vertical}
  textarea{min-height:70px;white-space:pre}
  input.ans{height:42px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  button{font-family:var(--sans);font-size:14px;font-weight:550;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);border-radius:9px;padding:9px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  button.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.45;cursor:default}
  .choices{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .choice{text-align:left;font-family:var(--mono);font-size:13.5px;line-height:1.4;white-space:pre-wrap}
  .choice.sel{border-color:var(--accent)}
  .choice.correct{background:var(--ok-bg);border-color:var(--ok)}
  .choice.wrong{background:var(--bad-bg);border-color:var(--bad)}
  .fb{margin-top:13px;border-radius:10px;padding:11px 13px;font-size:13.5px}
  .fb .g{font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  .fb.exact{background:var(--ok-bg);border:1px solid var(--ok)} .fb.exact .g{color:var(--ok)}
  .fb.close{background:var(--close-bg);border:1px solid var(--close)} .fb.close .g{color:var(--close)}
  .fb.wrong{background:var(--bad-bg);border:1px solid var(--bad)} .fb.wrong .g{color:var(--bad)}
  .fb pre{font-family:var(--mono);font-size:13px;white-space:pre-wrap;margin:6px 0 0;background:rgba(127,127,127,.10);padding:8px 10px;border-radius:7px}
  .fb .why{margin-top:8px;color:var(--muted);font-family:var(--sans)}
  .hintlink{font-size:12.5px;color:var(--accent);background:none;border:none;padding:4px 0;cursor:pointer;font-weight:550}
  .panelhead{font-weight:600;font-size:14px;margin:0 0 10px}
  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{font-family:var(--mono);font-size:12px;padding:6px 11px;border:1px solid var(--line);border-radius:999px;background:var(--bg);cursor:pointer;user-select:none}
  .pill.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .pill.empty{opacity:.4;cursor:default}
  .small{font-size:12px;color:var(--muted)}
  .summary .big{font-family:var(--mono);font-size:30px;font-weight:600}
  .bars{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .bar{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px}
  .bar .track{flex:1;height:7px;background:var(--line);border-radius:4px;overflow:hidden}
  .bar .fill{height:100%;background:var(--accent)}
  .miss{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px}
  .center{text-align:center}
  details{margin-top:6px}
  summary{cursor:pointer;font-size:13px;color:var(--muted)}
  .kbd{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================== DECK DATA ==============================
   Single-file inline dataset. Keep a separate deck.json for editing and
   paste the cards array back in here on rebuild.                          */
const DECK_DATA = {
 "meta": {
  "version": "1.1",
  "reference_lang": "en",
  "level": "intermediate",
  "subject": "bash/linux",
  "created": "2026-07-06"
 },
 "topics": [
  {
   "id": "b1",
   "label": "Quoting & expansion"
  },
  {
   "id": "b2",
   "label": "Globbing & wildcards"
  },
  {
   "id": "b3",
   "label": "Pipes & redirection"
  },
  {
   "id": "b4",
   "label": "Exit codes & logic"
  },
  {
   "id": "b5",
   "label": "Variables & environment"
  },
  {
   "id": "b6",
   "label": "Text processing"
  },
  {
   "id": "b7",
   "label": "Files & permissions"
  },
  {
   "id": "b8",
   "label": "Processes & jobs"
  },
  {
   "id": "b9",
   "label": "Tests & conditionals"
  },
  {
   "id": "b10",
   "label": "Loops & scripting"
  },
  {
   "id": "b11",
   "label": "Networking basics"
  },
  {
   "id": "b12",
   "label": "Arrays"
  },
  {
   "id": "b13",
   "label": "Argument parsing"
  },
  {
   "id": "b14",
   "label": "Gotcha gauntlet"
  }
 ],
 "cards": [
  {
   "id": "b1-001",
   "topic": "b1",
   "name": "Single vs double quotes",
   "summary": "Single quotes are literal: nothing inside expands. Double quotes expand $variables and $(commands) but protect against word splitting and globbing. Rule of thumb: double-quote every expansion; single-quote when you mean the literal text.",
   "predict": [
    {
     "code": "x=world\necho '$x'\necho \"$x\"",
     "output": "$x\nworld",
     "why": "Single quotes suppress expansion; double quotes perform it."
    }
   ]
  },
  {
   "id": "b1-002",
   "topic": "b1",
   "name": "Word splitting on unquoted expansion",
   "summary": "An unquoted $x is split on whitespace into separate words before the command runs; \"$x\" stays one word. This is THE reason to quote expansions — filenames with spaces break otherwise.",
   "predict": [
    {
     "code": "x='a   b'\nprintf '%s\\n' $x\nprintf '%s\\n' \"$x\"",
     "output": "a\nb\na   b",
     "why": "Unquoted, $x becomes two arguments; quoted, it stays one (inner spaces preserved)."
    }
   ]
  },
  {
   "id": "b1-003",
   "topic": "b1",
   "name": "Command substitution",
   "summary": "$(cmd) runs cmd and substitutes its stdout (trailing newlines stripped) into the line. It nests cleanly, unlike the legacy backticks.",
   "predict": [
    {
     "code": "echo \"Now: $(echo hi)\"",
     "output": "Now: hi",
     "why": "The inner command's output is spliced into the string."
    }
   ]
  },
  {
   "id": "b1-004",
   "topic": "b1",
   "name": "Default value ${var:-word}",
   "summary": "${var:-word} expands to $var if set and non-empty, else to word — without assigning. ${var:=word} additionally assigns. The whole family (:-, :=, :?, :+) handles unset/empty parameters.",
   "predict": [
    {
     "code": "unset name\necho \"${name:-guest}\"",
     "output": "guest",
     "why": "name is unset, so the fallback after :- is used."
    }
   ]
  },
  {
   "id": "b1-005",
   "topic": "b1",
   "name": "String length ${#var}",
   "summary": "${#var} is the length of the value in characters. Part of a larger ${...} toolbox: ${var#pat}/${var%pat} strip prefixes/suffixes, ${var/pat/rep} substitutes.",
   "predict": [
    {
     "code": "s=hello\necho ${#s}",
     "output": "5",
     "why": "# before the name inside braces yields the length."
    }
   ]
  },
  {
   "id": "b1-006",
   "topic": "b1",
   "name": "Arithmetic $(( ))",
   "summary": "$((expr)) does integer arithmetic with C-like precedence and operators — no bc needed for whole numbers. Variables inside need no $.",
   "predict": [
    {
     "code": "echo $((2 + 3 * 4))",
     "output": "14",
     "why": "* binds tighter than +, like C: 2 + 12."
    }
   ]
  },
  {
   "id": "b1-007",
   "topic": "b1",
   "name": "Brace expansion",
   "summary": "Braces generate strings BEFORE any variable expansion: {1..3} ranges, {a,b} alternatives. It is textual generation, not globbing — nothing needs to exist on disk.",
   "predict": [
    {
     "code": "echo file{1..3}.txt",
     "output": "file1.txt file2.txt file3.txt",
     "why": "The brace range stamps out one word per value."
    }
   ]
  },
  {
   "id": "b1-008",
   "topic": "b1",
   "name": "Variable name boundaries",
   "summary": "$x0 is the variable named x0, not $x followed by 0 — the name greedily takes letters/digits/underscores. Braces mark the boundary: ${x}0.",
   "predict": [
    {
     "code": "x=5\necho \"A$x0\"\necho \"A${x}0\"",
     "output": "A\nA50",
     "why": "$x0 is the (unset, empty) variable x0; ${x}0 is x then a literal 0."
    }
   ]
  },
  {
   "id": "b1-f01",
   "topic": "b1",
   "name": "Fallback operator",
   "summary": "The :- operator inside ${ } supplies a value when the variable is unset or empty, without modifying it.",
   "fill": [
    {
     "code": "port=\"${PORT__8080}\"   # use 8080 when PORT is unset/empty",
     "answer": ":-",
     "hint": "the use-default operator"
    }
   ]
  },
  {
   "id": "b1-f02",
   "topic": "b1",
   "name": "Length operator",
   "summary": "A leading # inside the braces turns the expansion into the value's character count.",
   "fill": [
    {
     "code": "n=${_name}   # number of characters in $name",
     "answer": "#",
     "hint": "one character, before the name"
    }
   ]
  },
  {
   "id": "b1-f03",
   "topic": "b1",
   "name": "Capture command output",
   "summary": "$( opens a command substitution; prefer it over backticks — it nests and reads clearly.",
   "fill": [
    {
     "code": "today=__date +%F)   # capture the command's stdout",
     "answer": "$(",
     "hint": "the modern substitution opener"
    }
   ]
  },
  {
   "id": "b1-c01",
   "topic": "b1",
   "name": "Which quotes expand?",
   "summary": "Double quotes expand $var and $(cmd) but keep the result one word; single quotes are fully literal. Unquoted expands AND splits AND globs — the dangerous one.",
   "confusable": [
    {
     "prompt": "You want $HOME expanded but the result kept as ONE word even if it contains spaces. Which?",
     "options": [
      "'$HOME'",
      "\"$HOME\"",
      "$HOME",
      "\\$HOME"
     ],
     "answer": 1,
     "explain": "Double quotes: expansion happens, splitting and globbing don't. Single quotes would print the literal $HOME; unquoted risks splitting."
    }
   ]
  },
  {
   "id": "b1-c02",
   "topic": "b1",
   "name": "Boundary or braces",
   "summary": "Braces delimit the variable name explicitly — the fix whenever a variable abuts more text.",
   "confusable": [
    {
     "prompt": "x=5. Which prints 50?",
     "options": [
      "echo $x0",
      "echo ${x}0",
      "echo $[x]0",
      "echo $((x))0  # prints 50 too, but which is the plain-string idiom?"
     ],
     "answer": 1,
     "explain": "${x}0 ends the name at x. $x0 reads the variable x0. (The arithmetic form also works numerically but braces are the general string idiom.)"
    }
   ]
  },
  {
   "id": "b2-001",
   "topic": "b2",
   "name": "* matches any run of characters",
   "summary": "Globs are matched by the SHELL against filenames before the command runs; the command receives the expanded list. * = any run (not across /, not leading dots), ? = one char, [..] = a class.",
   "predict": [
    {
     "code": "# dir contains: a.txt  b.txt  notes.md\nls *.txt",
     "output": "a.txt  b.txt",
     "why": "The shell expands *.txt to the matching names; ls just lists what it was handed."
    }
   ]
  },
  {
   "id": "b2-002",
   "topic": "b2",
   "name": "? matches exactly one character",
   "summary": "? matches exactly one character — a?.log matches a1.log but not a22.log (two chars where one is allowed).",
   "predict": [
    {
     "code": "# dir contains: a1.log  a22.log  b1.log\nls a?.log",
     "output": "a1.log",
     "why": "? is one character: a1 fits, a22 needs two."
    }
   ]
  },
  {
   "id": "b2-003",
   "topic": "b2",
   "name": "Unmatched glob stays literal",
   "summary": "By default an unmatched glob is passed through UNCHANGED as the literal pattern — commands then see *.xyz as an argument. shopt -s nullglob makes it expand to nothing; failglob makes it an error.",
   "predict": [
    {
     "code": "# dir contains: a.txt\necho *.xyz",
     "output": "*.xyz",
     "why": "No match, so the pattern itself becomes the argument (default bash behaviour)."
    }
   ]
  },
  {
   "id": "b2-004",
   "topic": "b2",
   "name": "Dotfiles are excluded",
   "summary": "* and ? never match a leading dot: hidden files are skipped unless you ask (.* or shopt -s dotglob). That is why ls * misses .env.",
   "predict": [
    {
     "code": "# dir contains: .env  a.txt\necho *",
     "output": "a.txt",
     "why": "Leading-dot names require an explicit leading dot in the pattern."
    }
   ]
  },
  {
   "id": "b2-005",
   "topic": "b2",
   "name": "Character classes",
   "summary": "[ab]* matches names starting with a or b; [!ab]* (or [^ab]*) negates; ranges like [0-9] work. Same bracket idea as regex, but the surrounding grammar is glob, not regex.",
   "predict": [
    {
     "code": "# dir contains: a1.txt  b2.txt  c3.txt\nls [ab]*.txt",
     "output": "a1.txt  b2.txt",
     "why": "The class matches a first letter of a or b; c3.txt is excluded."
    }
   ]
  },
  {
   "id": "b2-f01",
   "topic": "b2",
   "name": "Single-character wildcard",
   "summary": "? is the one-character wildcard; combine with literals to pin a length: ??? matches exactly three characters.",
   "fill": [
    {
     "code": "ls report_.pdf   # match report1.pdf, reportA.pdf — one char only",
     "answer": "?",
     "hint": "one character, one symbol"
    }
   ]
  },
  {
   "id": "b2-c01",
   "topic": "b2",
   "name": "Glob is not regex",
   "summary": "Globs match filenames in the shell (* = any run); regexes match text in tools like grep (.* = any run, * alone = repeat previous). Quoting a pattern stops the shell globbing it before grep sees it.",
   "confusable": [
    {
     "prompt": "In grep (regex), what is the equivalent of the shell glob *.txt's 'any characters'?",
     "options": [
      "*",
      "%",
      ".*",
      "?"
     ],
     "answer": 2,
     "explain": "Regex: . is any char, * repeats it, so .* = any run. A bare * in regex modifies the previous atom — not a wildcard on its own."
    }
   ]
  },
  {
   "id": "b2-008",
   "topic": "b2",
   "name": "dotglob switches hidden files on",
   "summary": "shopt -s dotglob makes * match leading-dot names too — the clean way to include hidden files in a glob. shopt -u dotglob switches it back off.",
   "predict": [
    {
     "code": "touch .hidden visible\necho *\nshopt -s dotglob\necho *",
     "output": "visible\n.hidden visible",
     "why": "By default * skips leading-dot names; with dotglob set, .hidden joins the (alphabetically sorted) expansion."
    }
   ]
  },
  {
   "id": "b2-009",
   "topic": "b2",
   "name": "extglob negation",
   "summary": "shopt -s extglob unlocks extended patterns: !(pat) everything EXCEPT, ?(pat) zero-or-one, +(pat) one-or-more, @(a|b) exactly one of. Enable it on its own line — the parser must see the option before it reads the pattern.",
   "predict": [
    {
     "code": "shopt -s extglob\ntouch a.txt b.log c.txt\nprintf '%s\\n' !(*.log)",
     "output": "a.txt\nc.txt",
     "why": "!(*.log) matches every name that does NOT match *.log. (On one ;-joined line this would be a syntax error — extglob must be on before the pattern is parsed.)"
    }
   ]
  },
  {
   "id": "b2-f02",
   "topic": "b2",
   "name": "Empty instead of literal",
   "summary": "With nullglob set, a glob that matches nothing expands to NOTHING instead of staying literal — so for f in *.txt simply runs zero times in an empty directory rather than once with the literal '*.txt'.",
   "fill": [
    {
     "code": "shopt -s ________   # unmatched globs expand to nothing, not themselves",
     "answer": "nullglob",
     "hint": "shopt option, 8 letters"
    }
   ]
  },
  {
   "id": "b2-c02",
   "topic": "b2",
   "name": "The .* trap",
   "summary": "The pattern .* matches every leading-dot name — INCLUDING the directory entries . and .. themselves. Scripts that loop or rm over .* touch the current and parent directory. Use dotglob, or the pattern .[!.]* for real dotfiles.",
   "confusable": [
    {
     "prompt": "for f in .* — why is this loop over hidden files risky?",
     "options": [
      "It also matches . and .. (current and parent directory)",
      ".* is regex syntax, not a glob",
      "Hidden files cannot be globbed at all",
      "It matches non-hidden files too"
     ],
     "answer": 0,
     "explain": ".* happily matches the . and .. entries, so the loop visits the current and parent directory. shopt -s dotglob with *, or the pattern .[!.]*, avoids them."
    }
   ]
  },
  {
   "id": "b3-001",
   "topic": "b3",
   "name": "> writes a file",
   "summary": "> redirects stdout to a file, creating or TRUNCATING it. The file is opened before the command runs — which is why 'cmd < f > f' destroys f.",
   "predict": [
    {
     "code": "echo hi > f.txt\ncat f.txt",
     "output": "hi",
     "why": "stdout of echo went into f.txt; cat reads it back."
    }
   ]
  },
  {
   "id": "b3-002",
   "topic": "b3",
   "name": ">> appends",
   "summary": ">> opens the file for append instead of truncating — the log-file operator.",
   "predict": [
    {
     "code": "echo a > f.txt\necho b >> f.txt\ncat f.txt",
     "output": "a\nb",
     "why": "> created the file with a; >> appended b."
    }
   ]
  },
  {
   "id": "b3-003",
   "topic": "b3",
   "name": "> truncates every time",
   "summary": "A second > on the same file wipes it first — only the last write survives. Append needs >>.",
   "predict": [
    {
     "code": "echo a > f.txt\necho b > f.txt\ncat f.txt",
     "output": "b",
     "why": "The second > truncated the file before writing."
    }
   ]
  },
  {
   "id": "b3-004",
   "topic": "b3",
   "name": "Pipes connect stdout to stdin",
   "summary": "cmd1 | cmd2 wires cmd1's stdout to cmd2's stdin, running both concurrently. Only STDOUT travels the pipe; stderr still goes to the terminal.",
   "predict": [
    {
     "code": "echo hello | tr a-z A-Z",
     "output": "HELLO",
     "why": "tr reads the piped text and upcases it."
    }
   ]
  },
  {
   "id": "b3-005",
   "topic": "b3",
   "name": "stderr is a separate stream",
   "summary": "fd 1 is stdout, fd 2 is stderr. 2>/dev/null discards errors while stdout flows normally — the two streams are independent until you merge them with 2>&1.",
   "predict": [
    {
     "code": "{ echo out; echo err 1>&2; } 2>/dev/null",
     "output": "out",
     "why": "The stderr line was redirected to /dev/null; only stdout remains."
    }
   ]
  },
  {
   "id": "b3-006",
   "topic": "b3",
   "name": "Counting lines through a pipe",
   "summary": "wc -l counts newline-terminated lines from stdin — the canonical pipe terminator for 'how many'.",
   "predict": [
    {
     "code": "printf 'a\\nb\\nc\\n' | wc -l",
     "output": "3",
     "why": "Three newline-terminated lines."
    }
   ]
  },
  {
   "id": "b3-007",
   "topic": "b3",
   "name": "< feeds a file to stdin",
   "summary": "cmd < file connects the file to the command's stdin — how you feed programs that only read standard input.",
   "predict": [

/* ============================== UNIT MODEL ============================== */
function unitsForCardMode(card, mode){
  if(mode==="predict")    return (card.predict||[]).map(function(it){return {kind:"text", item:it};});
  if(mode==="fill")       return (card.fill||[]).map(function(it){return {kind:"text", item:it};});
  if(mode==="confusable") return (card.confusable||[]).map(function(it){return {kind:"mc", item:it};});
  if(mode==="recall")     return (card.recall||[]).map(function(it){return {kind:"text", item:it};});
  if(mode==="complexity"){
    if(!card.ops) return [];
    return Object.keys(card.ops).map(function(op){return {kind:"text", item:{op:op, info:card.ops[op]}};});
  }
  return [];
}
function qidFor(card, mode, i){ return card.id+":"+mode+":"+i; }

function askableUnits(){
  var out = [];
  DECK_DATA.cards.forEach(function(card){
    if(!enabledTopics.has(card.topic)) return;
    MODE_LABELS.forEach(function(m){
      var mode = m[0];
      if(!enabledModes.has(mode)) return;
      unitsForCardMode(card, mode).forEach(function(u, i){
        out.push({card:card, mode:mode, i:i, kind:u.kind, item:u.item, qid:qidFor(card,mode,i)});
      });
    });
  });
  return out;
}
function topicHasMode(topicId, mode){
  return DECK_DATA.cards.some(function(c){
    return c.topic===topicId && unitsForCardMode(c, mode).length>0;
  });
}

/* ============================== SPACED REPETITION ============================== */
function weightFor(qid){
  var p = progress[qid];
  if(!p || !p.seen) return 12;              // never seen -> strong preference
  var acc = p.correct / p.seen;             // 0..1
  var w = 1 + (1 - acc) * 4;                // 1..5 with inaccuracy
  w = w / (1 + 0.5 * (p.streak || 0));      // decay with correct streak
  return Math.max(0.2, w);
}
function recordResult(qid, grade){
  var p = progress[qid] || {seen:0, correct:0, wrong:0, streak:0};
  p.seen += 1;
  if(grade==="exact"){ p.correct += 1; p.streak = (p.streak||0)+1; }
  else if(grade==="close"){ p.correct += 1; }          // near-miss: counts, holds streak
  else { p.wrong = (p.wrong||0) + 1; p.streak = 0; }
  p.last = grade;
  progress[qid] = p;
  var h = progress.__history || [];
  h.push({q:qid, g:grade, t:Date.now()});
  progress.__history = h.slice(-200);                  // rolling answer log
  saveProgress();
}

/* ============================== PROGRESS VIEW ============================== */
function statsForUnits(units){
  var attempted=0, seen=0, correct=0, wrong=0;
  units.forEach(function(u){
    var p = progress[u.qid];
    if(p && p.seen){ attempted++; seen+=p.seen; correct+=p.correct||0; wrong+=p.wrong||0; }
  });
  return {attempted:attempted, total:units.length, seen:seen, correct:correct, wrong:wrong};
}
function allUnitsForTopic(topicId){
  var out = [];
  DECK_DATA.cards.forEach(function(card){
    if(card.topic!==topicId) return;
    MODE_LABELS.forEach(function(m){
      unitsForCardMode(card, m[0]).forEach(function(u,i){
        out.push({qid:qidFor(card,m[0],i)});
      });
    });
  });
  return out;
}
function renderProgressCard(){
  var topics = DECK_DATA.topics.filter(function(t){
    return DECK_DATA.cards.some(function(c){return c.topic===t.id;});
  });
  var allUnits = [];
  topics.forEach(function(t){ allUnits = allUnits.concat(allUnitsForTopic(t.id)); });
  var g = statsForUnits(allUnits);
  if(!g.seen){
    return el('<div class="card"><div class="panelhead">Progress</div>'+
      '<div class="small">No answers recorded yet \u2014 finish a round and per-topic mastery appears here.</div></div>');
  }
  var acc = Math.round(g.correct/g.seen*100);
  var head = '<div class="small" style="margin-bottom:4px">'+g.attempted+'/'+g.total+
    ' questions attempted \u00b7 '+g.seen+' answers \u00b7 '+acc+'% correct</div>';
  var rows = topics.map(function(t){
    var s = statsForUnits(allUnitsForTopic(t.id));
    var cov = s.total ? s.attempted/s.total : 0;
    var tacc = s.seen ? s.correct/s.seen : 0;
    var mastery = Math.round(cov*tacc*100);          // 100% = all attempted, all correct
    var detail = s.seen ? (s.attempted+'/'+s.total+' \u00b7 '+Math.round(tacc*100)+'%') : '\u2014';
    return '<div class="bar"><span style="width:118px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(t.label)+'">'+esc(t.label)+'</span>'+
      '<span class="track"><span class="fill" style="width:'+mastery+'%"></span></span>'+
      '<span style="width:92px;text-align:right">'+detail+'</span></div>';
  }).join("");
  return el('<div class="card"><div class="panelhead">Progress</div>'+head+
    '<div class="bars" style="margin-top:8px">'+rows+'</div>'+
    '<div class="small" style="margin-top:8px">Bar = mastery (coverage \u00d7 accuracy). Right column: attempted \u00b7 accuracy.</div></div>');
}

/* weighted ordering: higher weight tends earlier, with variety */
function buildQueue(units){
  return units.map(function(u){
      var w = weightFor(u.qid);
      return { u:u, key: Math.pow(Math.random(), 1/Math.max(0.2,w)) };
    })
    .sort(function(a,b){ return b.key - a.key; })
    .map(function(x){ return x.u; });
}

/* ============================== GRADING ============================== */
function editDistance(a, b){   // optimal string alignment: single transposition = cost 1
  var m=a.length, n=b.length, d=[];
  for(var i=0;i<=m;i++){ d[i]=[i]; }
  for(var j=0;j<=n;j++){ d[0][j]=j; }
  for(i=1;i<=m;i++) for(j=1;j<=n;j++){
    var cost = a[i-1]===b[j-1] ? 0 : 1;
    d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+cost);
    if(i>1 && j>1 && a[i-1]===b[j-2] && a[i-2]===b[j-1])
      d[i][j] = Math.min(d[i][j], d[i-2][j-2]+cost);
  }
  return d[m][n];
}
function normLines(s){
  return String(s).replace(/\r/g,"").split("\n")
    .map(function(l){return l.replace(/\s+$/,"");})
    .join("\n").replace(/^\n+|\n+$/g,"");
}
var EXC_RE = /\b([A-Z][A-Za-z]*(?:Error|Exception|Interrupt|Iteration|Warning))\b/;
function gradeText(user, expected){
  var u = normLines(user), e = normLines(expected);
  if(u === e) return "exact";
  if(u.replace(/\s+/g,"") === e.replace(/\s+/g,"")) return "close";       // whitespace only
  var qu = u.replace(/['"]/g,'"'), qe = e.replace(/['"]/g,'"');           // quote style
  if(qu === qe) return "close";
  // short single-token answers: allow a 1-char typo for length>=5
  if(!/\n/.test(e) && e.length>=5 && editDistance(qu, qe) <= 1) return "close";
  return "wrong";
}
function gradeOutput(user, expected){
  var e = normLines(expected), u = normLines(user);
  var em = e.match(EXC_RE);
  if(em){                                                                  // expected is an exception
    var um = u.match(EXC_RE);
    if(um && um[1] === em[1]) return (u === em[1]) ? "exact" : "close";    // right type (maybe extra msg)
    if(/error|exception|raise|traceback/i.test(u)) return "close";        // knew it raised, wrong type
    return "wrong";
  }
  return gradeText(user, expected);
}

function normBigO(s){ return String(s).toLowerCase().replace(/\s+/g,"").replace(/^[~\u2248]/,""); }
function gradeBigO(user, expected){
  var u=normBigO(user), e=normBigO(expected);
  if(u===e) return "exact";
  var inner=function(x){ var m=x.match(/^o\((.*)\)$/); return m?m[1]:x; };  // tolerate missing O(...)
  if(inner(u)===inner(e)) return "close";
  return "wrong";
}

  var units = askableUnits();
  var cards = new Set(units.map(function(u){return u.card.id;})).size;
  return '<header><div class="logo">bash<b>Drill</b></div>'+
    '<div class="stat">'+cards+' cards \u00b7 '+units.length+' questions</div></header>';
}

function render(){
  app.innerHTML = "";
  app.appendChild(el(header()));
  if(session){ renderQuestion(); } else { renderHome(); }
}

function renderHome(){
  // topic pills
  var tp = DECK_DATA.topics.map(function(t){
    var has = DECK_DATA.cards.some(function(c){return c.topic===t.id;});
    var cls = "pill" + (enabledTopics.has(t.id)?" on":"") + (has?"":" empty");
    var lbl = esc(t.label) + (has?"":" \u00b7 soon");
    return '<span class="'+cls+'" data-topic="'+t.id+'">'+lbl+'</span>';
  }).join("");
  // mode pills
  var mp = MODE_LABELS.map(function(m){
    var any = DECK_DATA.cards.some(function(c){
      return enabledTopics.has(c.topic) && unitsForCardMode(c,m[0]).length>0; });
    var cls = "pill" + (enabledModes.has(m[0])?" on":"") + (any?"":" empty");
    return '<span class="'+cls+'" data-mode="'+m[0]+'">'+esc(m[1])+'</span>';
  }).join("");

  var c1 = el('<div class="card"><div class="panelhead" style="display:flex;justify-content:space-between;align-items:baseline">Topics'+
    '<span><button class="hintlink" data-sel="topics-all">All</button> <span class="small">\u00b7</span> '+
    '<button class="hintlink" data-sel="topics-none">None</button></span></div><div class="pills">'+tp+'</div></div>');
  c1.querySelector('[data-sel="topics-all"]').onclick = function(){
    DECK_DATA.topics.forEach(function(t){
      if(DECK_DATA.cards.some(function(c){return c.topic===t.id;})) enabledTopics.add(t.id);
    });
    render();
  };
  c1.querySelector('[data-sel="topics-none"]').onclick = function(){
    enabledTopics.clear(); render();
  };
  c1.querySelectorAll("[data-topic]").forEach(function(p){
    if(p.classList.contains("empty")) return;
    p.onclick=function(){ var id=p.getAttribute("data-topic");
      if(enabledTopics.has(id)) enabledTopics.delete(id); else enabledTopics.add(id);
      render(); };
  });
  var c2 = el('<div class="card"><div class="panelhead" style="display:flex;justify-content:space-between;align-items:baseline">Drill modes'+
    '<span><button class="hintlink" data-sel="modes-all">All</button> <span class="small">\u00b7</span> '+
    '<button class="hintlink" data-sel="modes-none">None</button></span></div><div class="pills">'+mp+'</div>'+
    '<div class="small" style="margin-top:10px">Predict-output is the high-value drill. '+
    (IS_TOUCH
      ? 'Type the answer, tap <span class="kbd">Check</span> to grade and <span class="kbd">Next</span> to continue.'
      : 'Enter answers; <span class="kbd">\u2318/Ctrl + Enter</span> submits a snippet, <span class="kbd">Enter</span> advances.')
    +'</div></div>');
  c2.querySelector('[data-sel="modes-all"]').onclick = function(){
    MODE_LABELS.forEach(function(m){
      if(DECK_DATA.cards.some(function(c){return unitsForCardMode(c, m[0]).length>0;})) enabledModes.add(m[0]);
    });
    render();
  };
  c2.querySelector('[data-sel="modes-none"]').onclick = function(){
    enabledModes.clear(); render();
  };
  c2.querySelectorAll("[data-mode]").forEach(function(p){
    p.onclick=function(){ var id=p.getAttribute("data-mode");
      if(enabledModes.has(id)) enabledModes.delete(id); else enabledModes.add(id);
      render(); };
  });

  var units = askableUnits();
  var startCard = el('<div class="card center"><button class="primary" id="startBtn" '+
    (units.length?"":"disabled")+'>Start round \u00b7 '+units.length+' questions</button>'+
    (LS_AVAILABLE?"":'<div class="small" style="margin-top:8px">Progress won\u2019t persist (storage unavailable here).</div>')+
    '</div>');
  startCard.querySelector("#startBtn").onclick = function(){ startRound(); };

  app.appendChild(c1); app.appendChild(c2); app.appendChild(renderProgressCard()); app.appendChild(startCard);
}

function startRound(reviewUnits){
  var review = Array.isArray(reviewUnits);
  var units = review ? reviewUnits : askableUnits();
  if(!units.length) return;
  session = { queue: review ? units.slice() : buildQueue(units),
              idx:0, results:[], review: review, total: units.length };
  nextQuestion();
}
function nextQuestion(){
  feedback=null; picked=null;
  if(session.idx >= session.queue.length){ renderSummary(); return; }
  currentU = session.queue[session.idx];
  render();
}

function renderCodeWithBlank(code){
  // replace runs of _ (>=1) with a styled blank
  return esc(code).replace(/_{1,}/g, function(m){ return '<span class="blank">'+m+'</span>'; });
}

function renderQuestion(){
  var u = currentU;
  var head = '<div class="eyebrow"><span class="topic">'+esc(topicLabel(u.card.topic))+'</span>'+
    '<span>'+esc(modeLabel(u.mode))+' \u00b7 '+(session.idx+1)+'/'+session.queue.length+
    (session.review?' \u00b7 review':'')+'</span></div>';
  var nameLine = '<p class="qname">'+esc(u.card.name)+'</p>';

  if(u.mode==="confusable"){
    renderMC(head, nameLine); return;
  }

  // text-answer modes: predict / fill / recall / complexity
  var body="", lbl="", multiline=false, codeHtml="";
  if(u.mode==="predict"){
    codeHtml='<pre class="code"><span class="prompt">$ bash</span>\n'+esc(u.item.code)+'</pre>';
    lbl="What appears on stdout? (exact)"; multiline=true;
  } else if(u.mode==="fill"){
    codeHtml='<pre class="code">'+renderCodeWithBlank(u.item.code)+'</pre>';
    lbl="Fill the blank"; multiline=false;
  } else if(u.mode==="recall"){
    codeHtml=''; lbl="Type the answer"; multiline=false;
    nameLine='<p class="qname">'+esc(u.item.prompt||u.card.name)+'</p>';
  } else if(u.mode==="complexity"){
    codeHtml='<pre class="code">'+esc(u.card.name)+'  \u2014  '+esc(u.item.op)+'</pre>';
    lbl="Average-case complexity, e.g. O(1), O(n), O(log n)"; multiline=false;
  }

  var input = multiline
    ? '<textarea id="ans" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="exact output\u2026"></textarea>'
    : '<input class="ans" id="ans" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="\u2026">';

  var hintBtn = (u.item && (u.item.hint))
    ? '<button class="hintlink" id="hintBtn">Show hint</button>' : '';

  var c = el('<div class="card">'+head+nameLine+codeHtml+
    '<label class="lbl">'+esc(lbl)+'</label>'+input+hintBtn+
    '<div class="row"><button class="primary" id="submit">Check</button>'+
    '<button id="skip">Skip</button></div><div id="fbslot"></div></div>');

  var ansEl = c.querySelector("#ans");
  c.querySelector("#submit").onclick = function(){ doGrade(ansEl.value); };
  c.querySelector("#skip").onclick = function(){ commit("wrong", ""); };
  if(hintBtn){
    c.querySelector("#hintBtn").onclick = function(){
      this.outerHTML='<div class="small" style="margin-top:6px">Hint: '+esc(u.item.hint)+'</div>';
    };
  }
  ansEl.addEventListener("keydown", function(e){
    if(e.key==="Enter"){
      if(multiline && !(e.metaKey||e.ctrlKey)) return;   // allow newlines in snippet output
      e.preventDefault(); doGrade(ansEl.value);
    }
  });
  app.appendChild(c);
  setTimeout(function(){ ansEl.focus(); }, 30);

  function doGrade(val){
    var expected = (u.mode==="predict") ? u.item.output
                 : (u.mode==="fill")    ? u.item.answer
                 : (u.mode==="recall")  ? u.item.answer
                 : (u.mode==="complexity") ? u.item.info.bigO : "";
    var grade = (u.mode==="predict") ? gradeOutput(val, expected)
              : (u.mode==="complexity") ? gradeBigO(val, expected)
              : gradeText(val, expected);
    commit(grade, val, expected);
  }
}

function renderMC(head, nameLine){
  var u = currentU, it = u.item;
  var opts = it.options.map(function(o,i){
    return '<button class="choice" data-i="'+i+'">'+esc(o)+'</button>';
  }).join("");
  var c = el('<div class="card">'+head+nameLine+
    '<p style="font-size:14px;margin:0 0 12px">'+esc(it.prompt)+'</p>'+
    '<div class="choices">'+opts+'</div><div id="fbslot"></div></div>');
  c.querySelectorAll(".choice").forEach(function(b){
    b.onclick=function(){
      if(feedback) return;
      picked = parseInt(b.getAttribute("data-i"),10);
      var grade = (picked===it.answer) ? "exact" : "wrong";
      c.querySelectorAll(".choice").forEach(function(x,i){
        x.disabled=true;
        if(i===it.answer) x.classList.add("correct");
        if(i===picked && picked!==it.answer) x.classList.add("wrong");
      });
      commitInto(c.querySelector("#fbslot"), grade, null, it.options[it.answer], it.explain);
    };
  });
  app.appendChild(c);
}

function commit(grade, val, expected){
  var why = currentU.mode==="complexity"
    ? (currentU.item.info && currentU.item.info.note)
    : currentU.item.why;
  commitInto(document.getElementById("fbslot"), grade, val, expected, why);
  // disable inputs
  var s=document.getElementById("submit"); if(s) s.disabled=true;
  var a=document.getElementById("ans"); if(a) a.disabled=true;
}
function commitInto(slot, grade, val, expected, why){
  feedback = grade;
  recordResult(currentU.qid, grade);
  session.results.push({u:currentU, grade:grade});
  var gtxt = grade==="exact"?"Correct":grade==="close"?"Close":"Not quite";
  var html='<div class="fb '+grade+'"><span class="g">'+gtxt+'</span>';
  if(expected!=null && grade!=="exact"){
    html += '<pre>'+esc(expected)+'</pre>';
  } else if(expected!=null && grade==="exact" && currentU.mode==="predict"){
    html += '<pre>'+esc(expected)+'</pre>';
  }
  if(why) html += '<div class="why">'+esc(why)+'</div>';
  html += '</div>';
  var summary = currentU.card && currentU.card.summary;
  var showTeach = summary && summary !== why;
  if(showTeach) html += '<button class="hintlink" id="teach">Teach me this</button>';
  html += '<div class="row"><button class="primary" id="next">'+
    (session.idx+1>=session.queue.length?"Finish":"Next")+'</button></div>';
  slot.innerHTML = html;
  var nb = slot.querySelector("#next");
  nb.onclick = advance;
  if(showTeach){
    slot.querySelector("#teach").onclick = function(){
      this.outerHTML = '<div class="why" style="margin-top:6px">'+esc(summary)+'</div>';
    };
  }
  setTimeout(function(){ document.addEventListener("keydown", enterAdvance); }, 0);
}
function enterAdvance(e){
  if(e.key==="Enter"){ e.preventDefault(); advance(); }
}
function advance(){
  document.removeEventListener("keydown", enterAdvance);
  session.idx += 1;
  nextQuestion();
}

function renderSummary(){
  var res = session.results;
  var exact = res.filter(function(r){return r.grade==="exact";}).length;
  var close = res.filter(function(r){return r.grade==="close";}).length;
  var wrong = res.filter(function(r){return r.grade==="wrong";}).length;
  var n = res.length || 1;
  var missed = res.filter(function(r){return r.grade==="wrong";}).map(function(r){return r.u;});

  function barRow(lbl, val, color){
    return '<div class="bar"><span style="width:54px">'+lbl+'</span>'+
      '<span class="track"><span class="fill" style="width:'+Math.round(val/n*100)+'%;background:'+color+'"></span></span>'+
      '<span style="width:28px;text-align:right">'+val+'</span></div>';
  }
  var missList = missed.length
    ? '<div class="miss">Missed: '+missed.map(function(u){return esc(u.card.name);}).join(", ")+'</div>'
    : '<div class="miss">Clean round \u2014 nothing missed.</div>';

  var c = el('<div class="card summary center">'+
    '<div class="eyebrow"><span class="topic">'+(session.review?"Review complete":"Round complete")+'</span><span></span></div>'+
    '<div class="big">'+exact+'/'+res.length+'</div>'+
    '<div class="small">exact \u00b7 '+close+' close \u00b7 '+wrong+' missed</div>'+
    '<div class="bars" style="text-align:left;max-width:340px;margin:14px auto 0">'+
      barRow("exact", exact, "var(--ok)")+
      barRow("close", close, "var(--close)")+
      barRow("missed", wrong, "var(--bad)")+
    '</div>'+missList+
    '<div class="row" style="justify-content:center;margin-top:16px">'+
      (missed.length?'<button class="primary" id="reviewBtn">Re-drill '+missed.length+' missed</button>':'')+
      '<button id="homeBtn">Done</button></div></div>');

  if(missed.length){
    c.querySelector("#reviewBtn").onclick = function(){ startRound(missed); };
  }
  c.querySelector("#homeBtn").onclick = function(){ session=null; render(); };
  app.innerHTML=""; app.appendChild(el(header())); app.appendChild(c);
}

/* ============================== BOOT ============================== */
render();

/* expose for runtime probe / debugging */
window.__pd = { DECK_DATA:DECK_DATA, askableUnits:askableUnits, buildQueue:buildQueue,
  gradeText:gradeText, gradeOutput:gradeOutput, gradeBigO:gradeBigO, weightFor:weightFor, unitsForCardMode:unitsForCardMode };
</script>
</body>
</html>
