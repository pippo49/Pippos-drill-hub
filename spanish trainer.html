<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vocabulario — Spanish / English trainer</title>
<style>
  :root {
    --paper: #f8f3e8;
    --ink: #1a1a1a;
    --muted: #5a4a3a;
    --accent: #b43c28;
    --green: #2a6f3d;
    --amber: #a06a1f;
    --red: #b43c28;
  }
  * { box-sizing: border-box; }
  html { color-scheme: light only; }
  html, body { margin: 0; padding: 0; }
  html { background: #f8f3e8 !important; }
  body {
    background: #f8f3e8 !important;
    color: #1a1a1a !important;
    font-family: "EB Garamond", Georgia, "Times New Roman", serif;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { border-bottom: 1px solid var(--ink); padding-bottom: 16px; margin-bottom: 28px; }
  header h1 { margin: 0; font-size: 2.4rem; font-weight: 500; letter-spacing: -0.01em; font-style: italic; color: #1a1a1a !important; }
  header h1 .accent { font-style: normal; color: var(--accent) !important; margin-left: 12px; font-size: 1.5rem; }
  header h1 .subtitle { font-size: 1.1rem; font-style: normal; color: var(--muted) !important; margin-left: 12px; }
  .stats { font-size: 0.85rem; color: var(--muted) !important; line-height: 1.6; }
  .meta-line { margin-top: 10px; font-size: 0.85rem; color: var(--muted) !important; font-style: italic; }
  .header-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; }

  .section-label {
    font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted) !important; margin-bottom: 8px;
  }
  button {
    /* iOS tap responsiveness */
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(180, 60, 40, 0.2);
    -webkit-appearance: none;
    appearance: none;
  }
  .modes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .mode-btn {
    background: transparent; color: var(--ink); border: 1px solid var(--ink);
    padding: 8px 14px; font-family: inherit; font-size: 0.95rem;
    cursor: pointer; letter-spacing: 0.02em; transition: all 0.15s ease;
  }
  .mode-btn.active { background: var(--ink); color: var(--paper); }

  .card {
    background: #ffffff !important; border: 1px solid var(--ink);
    padding: 22px 32px 36px; position: relative;
    box-shadow: 8px 8px 0 -2px rgba(180,60,40,0.15);
    color: #1a1a1a !important;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px; margin-bottom: 10px;
  }
  .card .prompt-label {
    text-align: right; flex: 1 1 auto; min-width: 0; line-height: 1.35;
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted) !important;
  }
  .card .prompt {
    font-size: 2rem; font-weight: 500; line-height: 1.2;
    margin-bottom: 24px; margin-top: 8px;
    color: #1a1a1a !important;
  }
  .card .prompt .pos {
    font-size: 0.9rem; color: var(--muted) !important; font-style: italic; margin-left: 12px;
  }
  .card .prompt-sub {
    font-size: 1rem; line-height: 1.4; color: var(--muted) !important;
    margin-top: -14px; margin-bottom: 24px;
  }
  .card .prompt-sub .hint-link {
    background: transparent; border: none; padding: 0; cursor: pointer;
    font: inherit; color: var(--accent) !important; text-decoration: underline;
    -webkit-tap-highlight-color: rgba(180, 60, 40, 0.2);
  }
  .card input[type=text] {
    width: 100%; padding: 10px 12px; font-size: 1.2rem; font-family: inherit;
    border: none; border-bottom: 1px solid var(--ink); background: #ffffff !important;
    outline: none; color: #1a1a1a !important;
  }
  .card input[type=text].g-exact, .card input[type=text].g-diacritic { color: var(--green) !important; }
  .card input[type=text].g-typo { color: var(--amber) !important; }
  .card input[type=text].g-wrong { color: var(--red) !important; }
  .feedback { margin-top: 16px; font-size: 1rem; line-height: 1.6; color: #1a1a1a !important; }
  .feedback .ok { color: var(--green) !important; }
  .feedback .near { color: var(--amber) !important; }
  .feedback .bad { color: var(--red) !important; }
  .feedback strong { font-weight: 600; }

  .actions {
    display: flex; gap: 12px; margin-top: 28px;
    flex-wrap: wrap; justify-content: center;
  }
  .actions .btn-primary {
    min-width: 180px;
    padding: 12px 24px;
    font-size: 1rem;
  }
  .actions-secondary {
    display: flex; gap: 8px; margin-top: 16px;
    flex-wrap: wrap; justify-content: center;
  }
  .q-counter {
    flex: 0 0 auto; white-space: nowrap; align-self: baseline;
    font-size: 0.7rem; letter-spacing: 0.15em;
    color: var(--muted) !important;
  }
  .actions-end { display: flex; justify-content: center; margin-top: 20px; }
  .btn-end {
    background: transparent; border: none; cursor: pointer;
    font-family: inherit; font-size: 0.85rem; font-style: italic;
    color: var(--muted) !important; text-decoration: underline;
  }
  .conj-section { margin-top: 14px; }
  .mc-options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .mc-option {
    display: block; width: 100%; text-align: left; cursor: pointer;
    padding: 14px 16px; font-family: inherit; font-size: 1.1rem;
    background: #faf7ef; color: #1a1a1a !important; border: 1px solid var(--ink);
  }
  .mc-option:active { background: #efe9da; }
  .mc-option[disabled] { cursor: default; }
  .mc-num { color: var(--muted) !important; font-size: 0.85rem; margin-right: 4px; }
  .mc-gloss { color: var(--muted) !important; font-style: italic; }
  .mc-option.mc-correct { background: #e3f1e6 !important; border-color: #2a6f3d !important; color: #1f5630 !important; }
  .mc-option.mc-correct .mc-num { color: #2a6f3d !important; }
  .mc-option.mc-wrong { background: #f6e1de !important; border-color: #9a3326 !important; color: #7a2a20 !important; }
  .mc-option.mc-wrong .mc-num { color: #9a3326 !important; }
  .conj-toggle {
    background: transparent; border: none; cursor: pointer; padding: 0;
    font-family: inherit; font-size: 0.85rem; font-style: italic;
    color: var(--muted) !important; text-decoration: underline;
  }
  .conj-table { display: none; margin-top: 10px; font-size: 0.95rem; line-height: 1.7; }
  .conj-table.open { display: block; }
  .conj-label {
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted) !important; margin-bottom: 4px;
  }
  .conj-row { display: flex; gap: 12px; border-bottom: 1px dashed rgba(26,26,26,0.15); padding: 2px 0; }
  .conj-row .cp { width: 110px; flex-shrink: 0; color: var(--muted) !important; }
  .summary-head { font-size: 1.15rem; margin: 8px 0 18px; line-height: 1.5; }
  .summary-section { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted) !important; margin: 18px 0 6px; }
  .summary-row {
    padding: 10px 0; border-bottom: 1px dashed rgba(26,26,26,0.25);
    font-size: 1rem; line-height: 1.5;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .sr-target { color: var(--green) !important; font-weight: 600; }
  .summary-row .sr-yours { color: var(--red) !important; font-style: italic; }
  .summary-row.near .sr-yours { color: var(--amber) !important; }
  .btn-primary {
    background: #1a1a1a !important; color: #f8f3e8 !important; border: 1px solid #1a1a1a;
    padding: 8px 16px; font-family: inherit; font-size: 0.95rem;
    cursor: pointer; letter-spacing: 0.02em;
  }
  .btn-ghost {
    background: #f8f3e8 !important; color: #1a1a1a !important; border: 1px solid #1a1a1a;
    padding: 8px 14px; font-family: inherit; font-size: 0.9rem;
    cursor: pointer; letter-spacing: 0.02em;
  }
  .btn-danger { color: #b43c28 !important; border-color: #b43c28; }

  footer {
    margin-top: 36px; padding-top: 16px;
    border-top: 1px solid rgba(26,26,26,0.2);
    display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.85rem; align-items: center;
  }
  .footer-note {
    margin-top: 16px; font-size: 0.75rem; color: var(--muted) !important;
    font-style: italic; text-align: center; line-height: 1.6;
  }
  .export-msg { color: var(--green) !important; font-style: italic; margin-left: 8px; }
  .empty { padding: 36px; text-align: center; color: var(--muted) !important; font-style: italic; }

  /* Inline file label */
  .file-label { display: inline-block; }
  .file-label input { display: none; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-row">
      <h1>Vocabulario<span class="accent">·</span><span class="subtitle">español / english</span></h1>
      <div class="stats" id="stats"></div>
      <div class="stats" id="selection-count"></div>
    </div>
    <div class="meta-line" id="deck-meta"></div>
  </header>

  <section>
    <div class="section-label">Drill types</div>
    <div class="modes" id="modes"></div>
  </section>

  <section>
    <div class="section-label">Lessons</div>
    <div class="modes" id="lessons"></div>
  </section>

  <div id="card-area">
    <div class="empty">Loading…</div>
  </div>

  <footer>
    <button class="btn-ghost" id="btn-export">Export progress</button>
    <button class="btn-ghost" id="btn-copy">Copy to clipboard</button>
    <label class="btn-ghost file-label">
      Import progress
      <input type="file" id="file-import" accept=".json">
    </label>
    <button class="btn-ghost btn-danger" id="btn-reset">Reset</button>
    <span class="export-msg" id="export-msg"></span>
  </footer>

  <div class="footer-note">
    Progress is kept in this browser (localStorage). Use “Export” or “Copy” to back up your progress as JSON; use “Import” to restore it.
  </div>

</div>

// === DIAGNOSTIC: catch any errors and show them on the page ===
window.addEventListener("error", function(e) {
  var el = document.getElementById("error-box");
  if (!el) {
    el = document.createElement("div");
    el.id = "error-box";
    el.style.cssText = "background:#ffeaea;border:2px solid #b43c28;padding:12px;margin:16px;font-family:monospace;font-size:12px;color:#b43c28;white-space:pre-wrap;word-break:break-word;position:fixed;top:0;left:0;right:0;z-index:9999;max-height:50vh;overflow:auto";
    document.body && document.body.insertBefore(el, document.body.firstChild);
  }
  el.textContent += "ERROR: " + (e.message || e.error || e) + "\n  at " + (e.filename || "?") + ":" + (e.lineno || "?") + "\n";
});
window.addEventListener("unhandledrejection", function(e) {
  var el = document.getElementById("error-box") || (function(){
    var d = document.createElement("div");
    d.id = "error-box";
    d.style.cssText = "background:#ffeaea;border:2px solid #b43c28;padding:12px;margin:16px;font-family:monospace;font-size:12px;color:#b43c28;white-space:pre-wrap;word-break:break-word;position:fixed;top:0;left:0;right:0;z-index:9999;max-height:50vh;overflow:auto";
    document.body && document.body.insertBefore(d, document.body.firstChild);
    return d;
  })();
  el.textContent += "PROMISE REJECTION: " + (e.reason && e.reason.message || e.reason || e) + "\n";
});

const normalize = (s) => (s || "").trim().toLowerCase().replace(/[.,!?;:]/g, "").replace(/\s+/g, " ");

const DIACRITIC_MAP = {
  "ą":"a","ć":"c","ę":"e","ł":"l","ń":"n","ó":"o","ś":"s","ź":"z","ż":"z",
  "ä":"a","ö":"o","ü":"u","ß":"ss",
  "á":"a","é":"e","í":"i","ú":"u","ñ":"n"
};
const stripDiacritics = (s) => s.replace(/[ąćęłńóśźżäöüßáéíúñ]/g, ch => DIACRITIC_MAP[ch] || ch);

const editDistance = (a, b) => {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const m = a.length, n = b.length;
  const prev2 = new Array(n + 1);
  let prev = new Array(n + 1);
  let curr = new Array(n + 1);
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      curr[j] = Math.min(curr[j-1] + 1, prev[j] + 1, prev[j-1] + cost);
      if (i > 1 && j > 1 && a[i-1] === b[j-2] && a[i-2] === b[j-1]) {
        curr[j] = Math.min(curr[j], prev2[j-2] + 1);
      }
    }
    for (let j = 0; j <= n; j++) { prev2[j] = prev[j]; prev[j] = curr[j]; curr[j] = 0; }
  }
  return prev[n];
};

const tolerance = (len) => {
  if (len <= 3) return 0;
  if (len <= 5) return 1;
  if (len <= 9) return 1;
  return 2;
};

// Drop reflexive particles that don't change the semantic answer (German sich, Polish się).
// Token-based because JS \b boundaries don't work with Polish characters like ę.
const FILLER = {to:1, me:1, te:1, se:1, nos:1, os:1};
const stripGermanFiller = (s) => s.split(" ").filter(function(w) { return !FILLER[w]; }).join(" ").trim();

const gradeOne = (input, target) => {
  let ni = normalize(input);
  let nt = normalize(target);
  if (!ni) return "wrong";
  // Make "sich entschuldigen" and "entschuldigen" interchangeable, both sides
  ni = stripGermanFiller(ni);
  nt = stripGermanFiller(nt);
  if (ni === nt) return "exact";
  if (stripDiacritics(ni) === stripDiacritics(nt)) return "diacritic";
  const d = editDistance(stripDiacritics(ni), stripDiacritics(nt));
  if (d <= tolerance(Math.max(ni.length, nt.length))) return "typo";
  return "wrong";
};
const RANK = { exact: 3, diacritic: 2, typo: 1, wrong: 0 };

const gradeAnswer = (input, target) => {
  if (!input || !target) return "wrong";
  const alts = target.split(/[,/]/).map(a => a.trim()).filter(Boolean);
  let best = "wrong";
  for (const a of alts) {
    const g = gradeOne(input, a);
    if (RANK[g] > RANK[best]) best = g;
  }
  return best;
};

// Remove parenthetical notes from German for matching ("gehen (um etwas)" → "gehen")

const weightFor = (stats, id) => {
  const s = stats[id] || { correct: 0, wrong: 0, seen: 0, streak: 0 };
  if (s.seen === 0) return 12;             // never asked → strongly preferred
  const accuracy = s.correct / s.seen;
  const base = 1 + (1 - accuracy) * 4;     // 1 (always right) … 5 (always wrong)
  return base / (1 + (s.streak || 0) * 1.5);  // each correct streak fades it faster
};

const weightedPick = (pool, weights) => {
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
};

const shuffle = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
};

// === QUESTION GENERATORS ===
function generateQuestion(mode) {
  const entries = VOCAB_DATA.entries;
  let pool = [], weights = [];

  const buildPool = (filter) => {
    pool = entries.filter(function(e){ return filter(e) && enabledLessons[e.lesson]; });
    if (pool.length === 0) { weights = []; return; }
    // Never ask the same word twice in a row, as long as there's an alternative
    if (pool.length > 1) {
      const last = recentIds[recentIds.length - 1];
      const trimmed = pool.filter(function(e){ return e.id !== last; });
      if (trimmed.length > 0) pool = trimmed;
    }
    weights = pool.map(function(e) {
      var w = weightFor(progress.stats, e.id);
      // Within this round, strongly prefer words not yet asked, so a round walks
      // through the whole selection once before repeating.
      if (!roundAsked.has(e.id)) w *= 6;
      // Soft penalty for recently asked words so they resurface much less often
      var idx = recentIds.lastIndexOf(e.id);
      if (idx >= 0) {
        var recency = recentIds.length - idx; // 1 = most recently asked
        w *= recency / (recency + 6);          // ~0.14 most-recent … →1 as it ages out
      }
      return w;
    });
  };

  // German alternatives of an entry, cleaned and lowercased
  const deAlts = function(e) {
    return cleanGerman(e.en).toLowerCase().split(/[,/]/).map(function(s){ return s.trim(); }).filter(Boolean);
  };

  if (mode === "es_en") {
    buildPool(e => e.es && e.en);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    // Accept the German of ANY entry with the same Polish headword (e.g. "to" has two senses)
    const sameP = entries.filter(function(x){ return x.es.toLowerCase() === e.es.toLowerCase() && x.en; });
    const accept = sameP.map(function(x){ return cleanGerman(x.en); });
    return { type: mode, entryId: e.id, prompt: e.es, promptLabel: "Spanish",
             answerLabel: "English", target: cleanGerman(e.en),
             rawTarget: sameP.map(function(x){ return x.en; }).join(" / "),
             acceptableAnswers: accept, posHint: e.pos };
  }
  if (mode === "en_es") {
    buildPool(e => e.es && e.en);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    // Accept the Polish of ANY entry sharing at least one German alternative
    // (e.g. "und" -> a / i / oraz are all correct)
    const myAlts = deAlts(e);
    const matches = entries.filter(function(x) {
      if (!x.en || !x.es) return false;
      return deAlts(x).some(function(a){ return myAlts.indexOf(a) >= 0; });
    });
    const accept = matches.map(function(x){ return x.es; });
    return { type: mode, entryId: e.id, prompt: e.en, promptLabel: "English",
             answerLabel: "Spanish", target: e.es,
             rawTarget: accept.join(" / "),
             acceptableAnswers: accept, posHint: e.pos };
  }
  if (mode === "multiple_choice") {
    buildPool(e => e.es && e.en);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const plToDe = Math.random() < 0.5;       // true: show Polish, choose German
    const field = plToDe ? "en" : "es";        // what the options display
    const back = plToDe ? "es" : "en";         // each option's translation (prompt language)
    const correct = e[field];
    // Don't offer the target's own synonyms/related as "wrong" options
    const exclude = {}; exclude[e.id] = true;
    (e.synonyms || []).forEach(function(id){ exclude[id] = true; });
    (e.related || []).forEach(function(id){ exclude[id] = true; });
    const taken = {}; taken[correct] = true;
    const distractors = [];
    const fillFrom = function(arr) {
      const sh = shuffle(arr);
      for (let i = 0; i < sh.length && distractors.length < 3; i++) {
        const val = sh[i][field];
        if (val && !taken[val]) { taken[val] = true; distractors.push({ text: val, trans: sh[i][back] }); }
      }
    };
    // Plausible: same part of speech, drawn from the whole deck; fall back to any pos
    fillFrom(entries.filter(function(x){ return x.pos === e.pos && x[field] && !exclude[x.id]; }));
    if (distractors.length < 3) fillFrom(entries.filter(function(x){ return x[field] && !exclude[x.id]; }));
    const choices = shuffle([{ text: correct, trans: e[back] }].concat(distractors));
    return { type: mode, entryId: e.id,
             prompt: e[plToDe ? "es" : "en"],
             promptLabel: plToDe ? "Choose the English" : "Choose the Spanish",
             answerLabel: plToDe ? "English" : "Spanish",
             rawTarget: correct, correct: correct, choices: choices };
  }
  if (mode === "ser_estar" || mode === "por_para") {
    // Curated sentence banks in VOCAB_DATA.special — not lesson-scoped.
    const bank = (VOCAB_DATA.special && VOCAB_DATA.special[mode]) || [];
    if (bank.length === 0) return null;
    let items = bank;
    if (bank.length > 1) {
      const last = recentIds[recentIds.length - 1];
      const trimmed = bank.filter(function(x){ return x.id !== last; });
      if (trimmed.length > 0) items = trimmed;
    }
    const item = items[Math.floor(Math.random() * items.length)];
    const m = item.es.match(/\{([^}]*)\}/);
    const answer = m ? m[1] : "";
    const blanked = item.es.replace(/\{[^}]*\}/, "_____");
    let other;
    if (mode === "por_para") {
      other = answer.toLowerCase() === "por" ? "para" : "por";
      if (answer.charAt(0) !== answer.charAt(0).toLowerCase()) {
        other = other.charAt(0).toUpperCase() + other.slice(1); // sentence-initial: match case
      }
    } else {
      other = item.wrong; // same person/number of the other verb (curated)
    }
    // The rule tag rides on the correct option as its gloss — revealed after answering.
    const choices = shuffle([{ text: answer, trans: item.note }, { text: other }]);
    return { type: mode, entryId: item.id,
             prompt: blanked,
             subPrompt: item.en,
             promptLabel: mode === "ser_estar" ? "Ser vs estar — choose the form" : "Por vs para — choose",
             answerLabel: "Choice",
             target: answer, rawTarget: answer, correct: answer, choices: choices };
  }
  if (mode === "conjugate") {
    buildPool(e => e.pos === "verb" && e.conjugation);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const persons = Object.keys(e.conjugation);
    const person = persons[Math.floor(Math.random() * persons.length)];
    const tense = e.conjugation_label || (e.aspect === "perfective" ? "simple future (perfective)" : "present");
    return { type: mode, entryId: e.id, person,
             prompt: e.es + "  (" + e.en + ")  — " + PRONOUN_LABELS[person],
             promptLabel: "Conjugate (" + tense + ", " + PRONOUN_LABELS[person] + ")",
             answerLabel: "Form", target: e.conjugation[person], rawTarget: e.conjugation[person] };
  }
  if (mode === "decline") {
    buildPool(e => e.pos === "adjective" && e.declension);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const cases = Object.keys(e.declension).filter(k => k !== "m_sg_nom");
    const which = cases[Math.floor(Math.random() * cases.length)];
    return { type: mode, entryId: e.id, which,
             prompt: e.es + "  (" + e.en + ")  — " + DECL_LABELS[which],
             promptLabel: "Decline adjective",
             answerLabel: "Form", target: e.declension[which], rawTarget: e.declension[which] };
  }
  if (mode === "noun_case") {
    buildPool(e => e.pos === "noun" && e.noun_decl);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const forms = Object.keys(e.noun_decl);
    const which = forms[Math.floor(Math.random() * forms.length)];
    const gtag = e.gender ? " [" + e.gender + "]" : "";
    return { type: mode, entryId: e.id, which,
             prompt: e.es + gtag + "  (" + e.en + ")  — " + NOUN_LABELS[which],
             promptLabel: "Noun case",
             answerLabel: "Form", target: e.noun_decl[which], rawTarget: e.noun_decl[which] };
  }
  if (mode === "cloze") {
    buildPool(e => e.cloze && e.cloze.length);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const arr = Array.isArray(e.cloze) ? e.cloze : [e.cloze];
    const c = arr[Math.floor(Math.random() * arr.length)];
    const m = c.es.match(/\{([^}]*)\}/);
    const answer = m ? m[1] : "";
    const blanked = c.es.replace(/\{[^}]*\}/, "_____");
    return { type: mode, entryId: e.id,
             prompt: blanked,
             subPrompt: c.en,
             hint: e.es,
             promptLabel: "Cloze — fill the gap",
             answerLabel: "Word", target: answer, rawTarget: answer };
  }
  if (mode === "antonym") {
    buildPool(e => e.antonyms && e.antonyms.length > 0);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const ids = e.antonyms;
    return { type: mode, entryId: e.id,
             prompt: e.es + "  (" + e.en + ")",
             promptLabel: "Give an antonym (Spanish)",
             answerLabel: "Antonym",
             target: byId[ids[0]].es,
             rawTarget: ids.map(id => byId[id].es).join(" / "),
             acceptableAnswers: ids.map(id => byId[id].es) };
  }
  if (mode === "synonym") {
    buildPool(e => e.synonyms && e.synonyms.length > 0);
    if (pool.length === 0) return null;
    const e = weightedPick(pool, weights);
    const ids = e.synonyms;
    // Verbs carry their aspect as display info (grading stays on the bare word)
    const aTag = x => x.aspect === "perfective" ? " (pf.)" : (x.aspect === "imperfective" ? " (impf.)" : "");
    return { type: mode, entryId: e.id,
             prompt: e.es + aTag(e) + "  (" + e.en + ")",
             promptLabel: "Give a synonym (Spanish)",
             answerLabel: "Synonym",
             target: byId[ids[0]].es,
             rawTarget: ids.map(id => byId[id].es + aTag(byId[id])).join(" / "),
             acceptableAnswers: ids.map(id => byId[id].es) };
  }
  return null;
}

function checkAnswer(q, input) {
  if (q.acceptableAnswers) {
    let best = "wrong";
    for (const a of q.acceptableAnswers) {
      const g = gradeAnswer(input, a);
      if (RANK[g] > RANK[best]) best = g;
    }
    return best;
  }
  return gradeAnswer(input, q.target);
}

function recordAnswer(grade) {
  const id = currentQ.entryId;
  const prev = progress.stats[id] || { correct: 0, wrong: 0, seen: 0, streak: 0 };
  const addCorrect = grade === "exact" || grade === "diacritic" ? 1 : (grade === "typo" ? 0.5 : 0);
  const addWrong = grade === "wrong" ? 1 : (grade === "typo" ? 0.5 : 0);
  const isCorrect = grade === "exact" || grade === "diacritic";
  progress.stats[id] = {
    correct: prev.correct + addCorrect,
    wrong: prev.wrong + addWrong,
    seen: prev.seen + 1,
    // consecutive correct answers; a wrong answer resets, a near-miss holds
    streak: isCorrect ? (prev.streak || 0) + 1 : (grade === "typo" ? (prev.streak || 0) : 0)
  };
  progress.history = (progress.history || []).slice(-200);
  progress.history.push({ id, type: currentQ.type, grade, t: Date.now() });
  saveProgress(progress);
  // Session tracking for the end-of-round summary (q kept for re-drilling)
  session.count++;
  roundAsked.add(currentQ.entryId);
  session.results.push({
    q: currentQ,
    userInput: (feedback && feedback.userInput) || "",
    grade: grade
  });
}

// === RENDER ===
function renderStats() {
  const stats = Object.values(progress.stats);
  const totalSeen = stats.reduce((a, s) => a + s.seen, 0);
  const totalCorrect = stats.reduce((a, s) => a + s.correct, 0);
  const pct = totalSeen === 0 ? 0 : Math.round((totalCorrect / totalSeen) * 100);
  const attempted = Object.keys(progress.stats).length;
  document.getElementById("stats").textContent =
    totalCorrect.toFixed(0) + "/" + totalSeen + " correct · " + pct + "% · " + attempted + "/" + VOCAB_DATA.entries.length + " words attempted";
}

function lessonLabel(l) {
  if (l === "earlier") return "Earlier";
  if (/^\d+$/.test(l)) return "L" + l;
  return l;   // Dodatek, Pocket dictionary, My words, ...
}
function setAllLessons(v) {
  ALL_LESSONS.forEach(function(l){ enabledLessons[l] = v; });
  saveLessons();
  renderLessons();
  pickQuestion();
}
function renderLessons() {
  const container = document.getElementById("lessons");
  if (!container) return;
  container.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.type = "button"; allBtn.className = "btn-ghost"; allBtn.textContent = "All";

  container.appendChild(allBtn);

  const noneBtn = document.createElement("button");

  noneBtn.addEventListener("click", function(){ setAllLessons(false); });
  container.appendChild(noneBtn);

  ALL_LESSONS.forEach(function(l) {
    const btn = document.createElement("button");
    btn.type = "button";

    });

function selectionCanAsk(e) {
  if ((enabledModes.es_en || enabledModes.en_es || enabledModes.multiple_choice) && e.es && e.en) return true;
  if (enabledModes.conjugate && e.pos === "verb" && e.conjugation) return true;
  if (enabledModes.decline && e.pos === "adjective" && e.declension) return true;
  if (enabledModes.noun_case && e.pos === "noun" && e.noun_decl) return true;
  if (enabledModes.cloze && e.cloze) return true;
  if (enabledModes.antonym && e.antonyms && e.antonyms.length > 0) return true;
  if (enabledModes.synonym && e.synonyms && e.synonyms.length > 0) return true;
  return false;
}
function renderSelectionCount() {
  const el = document.getElementById("selection-count");
  if (!el) return;
  const anyLesson = ALL_LESSONS.some(function(l){ return enabledLessons[l]; });
  const anyMode = Object.keys(enabledModes).some(function(m){ return enabledModes[m]; });
  if (!anyLesson) { el.textContent = "no lessons selected"; return; }
  if (!anyMode) { el.textContent = "no drill types selected"; return; }
  const n = VOCAB_DATA.entries.filter(function(e){
    return enabledLessons[e.lesson] && selectionCanAsk(e);
  }).length;
  el.textContent = n + (n === 1 ? " word" : " words") + " in selection";
}

function pickQuestion(focusInput) {
  summaryShowing = false;
  clozeHintShown = false;
  if (reviewMode) {
    if (reviewQueue.length > 0) {
      currentQ = reviewQueue.shift();
      feedback = null;
      renderCard(focusInput);
      return;
    }
    // queue exhausted: end the review round with its own summary
    if (session.count > 0) { showSummary(); return; }
    reviewMode = false;
  }
  const modes = Object.keys(enabledModes).filter(m => enabledModes[m]);
  if (modes.length === 0) {
    currentQ = null; feedback = null;
    renderCard();
    return;
  }
  // Once every word in the current selection has been asked this round, pause
  // and let the user choose to stop (and review) or keep going.
  if (!breakShown && session.count > 0 && selectionExhausted()) {
    showSelectionBreak();
    return;
  }
  for (let i = 0; i < 8; i++) {
    const mode = modes[Math.floor(Math.random() * modes.length)];
    const q = generateQuestion(mode);
    if (q) {
      currentQ = q; feedback = null;
      recentIds.push(q.entryId);
      if (recentIds.length > 20) recentIds.shift();
      renderCard(focusInput);
      return;
    }
  }
  currentQ = null; feedback = null;
  renderCard();
}

function selectionExhausted() {
  const selIds = VOCAB_DATA.entries
    .filter(function(e){ return enabledLessons[e.lesson] && selectionCanAsk(e); })
    .map(function(e){ return e.id; });
  if (selIds.length === 0) return false;
  for (let i = 0; i < selIds.length; i++) {
    if (!roundAsked.has(selIds[i])) return false;
  }
  return true;
}

function showSelectionBreak() {
  summaryShowing = false;
  currentQ = null;
  feedback = null;
  const area = document.getElementById("card-area");

  card.appendChild(headRow);

  card.appendChild(msg);

  actions.className = "actions";
  const end = document.createElement("button");
  end.type = "button"; end.className = "btn-primary";

  end.addEventListener("click", showSummary);

  const cont = document.createElement("button");

function showSummary() {
  summaryShowing = true;
  currentQ = null; feedback = null;

  const area = document.getElementById("card-area");
  area.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";

  const headRow = document.createElement("div");
  headRow.className = "card-head";
  const label = document.createElement("div");
  label.className = "prompt-label";
  label.textContent = "Round summary";
  headRow.appendChild(label);
  card.appendChild(headRow);

  const results = session.results;
  const nCorrect = results.filter(function(r){ return r.grade === "exact" || r.grade === "diacritic"; }).length;
  const nNear = results.filter(function(r){ return r.grade === "typo"; }).length;
  const nWrong = results.filter(function(r){ return r.grade === "wrong"; }).length;
  const pct = results.length ? Math.round((nCorrect + nNear * 0.5) / results.length * 100) : 0;

  const head = document.createElement("div");
  head.className = "summary-head";
  head.textContent = results.length + " questions · " + nCorrect + " correct · " +
    nNear + " near " + (nNear === 1 ? "miss" : "misses") + " · " + nWrong + " wrong · " + pct + "%";
  card.appendChild(head);

  const mistakes = results.filter(function(r){ return r.grade === "wrong" || r.grade === "typo"; });
  if (mistakes.length === 0 && results.length > 0) {
    const perfect = document.createElement("div");
    perfect.className = "summary-head";
    perfect.style.color = "#2a6f3d";
    perfect.textContent = reviewMode
      ? "All mistakes cleared — nothing left to re-drill. Świetnie! 🎉"
      : "Perfect round — nothing to review. Świetnie!";
    card.appendChild(perfect);
  } else if (mistakes.length > 0) {
    const section = document.createElement("div");
    section.className = "summary-section";
    section.textContent = "To review";
    card.appendChild(section);
    mistakes.forEach(function(r) {
      const row = document.createElement("div");
      row.className = "summary-row" + (r.grade === "typo" ? " near" : "");
      const q = document.createElement("div");
      q.textContent = r.q.prompt;
      row.appendChild(q);
      const a = document.createElement("div");
      const tgt = document.createElement("span");
      tgt.className = "sr-target";
      tgt.textContent = r.q.rawTarget;
      a.appendChild(tgt);
      if (r.userInput) {
        const yours = document.createElement("span");
        yours.className = "sr-yours";
        yours.textContent = "  — you wrote: " + r.userInput;
        a.appendChild(yours);
      }
      row.appendChild(a);
      card.appendChild(row);
    });
  }

  const actions = document.createElement("div");
  actions.className = "actions";
  if (mistakes.length > 0) {
    // Still some wrong/near: re-drill exactly these, reshuffled, and keep iterating.
    const remaining = mistakes.map(function(r){ return r.q; });
    const redrillFn = function() { startReviewRound(remaining); };
    summaryPrimaryAction = redrillFn;
    const redrill = document.createElement("button");
    redrill.type = "button"; redrill.className = "btn-primary";
    redrill.textContent = "Re-drill mistakes (" + mistakes.length + ") (Enter)";
    redrill.addEventListener("click", redrillFn);
    actions.appendChild(redrill);
    const next = document.createElement("button");
    next.type = "button"; next.className = "btn-ghost";
    next.textContent = "New round";
    next.addEventListener("click", startNewRound);
    actions.appendChild(next);
  } else {
    // Perfect round, or the review chain is fully cleared: cycle ends here.
    summaryPrimaryAction = startNewRound;
    const next = document.createElement("button");
    next.type = "button"; next.className = "btn-primary";
    next.textContent = "Start next round (Enter)";
    next.addEventListener("click", startNewRound);
    actions.appendChild(next);
  }
  card.appendChild(actions);

  area.appendChild(card);
}

function startNewRound() {
  session = { count: 0, results: [] };
  summaryShowing = false;
  reviewMode = false;
  reviewQueue = [];
  reviewOrigin = [];
  roundAsked = new Set();
  breakShown = false;
  pickQuestion();
}

// origin: the batch this review chain springs from. Pass the original set to
// preserve it through repeated passes; pass null to anchor a fresh chain on
// the questions being drilled now.
function startReviewRound(questions, origin) {
  session = { count: 0, results: [] };
  summaryShowing = false;
  reviewMode = true;
  reviewQueue = shuffle(questions.slice());
  reviewOrigin = (origin || questions).slice();
  pickQuestion();
}

function submit() {
  if (!currentQ || feedback) return;
  const input = document.getElementById("answer-input").value;
  const grade = checkAnswer(currentQ, input);
  feedback = { grade, target: currentQ.rawTarget, userInput: input };
  recordAnswer(grade);
  renderStats();
  updateCardForFeedback();
}

function reveal() {
  if (!currentQ || feedback) return;
  feedback = { grade: "wrong", target: currentQ.rawTarget, revealed: true };
  recordAnswer("wrong");
  renderStats();
  updateCardForFeedback();
}

function buildFeedbackEl() {
  const fb = document.createElement("div");
  fb.className = "feedback";
  const target = document.createElement("strong");
  target.textContent = feedback.target;
  const userTyped = (feedback.userInput || "").trim().toLowerCase();
  const targetText = (feedback.target || "").trim().toLowerCase();
  const isLiteralMatch = userTyped === targetText;

  if (feedback.grade === "exact" && isLiteralMatch) {
    const span = document.createElement("span"); span.className = "ok"; span.textContent = "✓ Correct.";
    fb.appendChild(span);
  } else if (feedback.grade === "exact") {
    const span = document.createElement("span"); span.className = "ok";
    span.appendChild(document.createTextNode("✓ Correct. Full answer: "));
    span.appendChild(target);
    fb.appendChild(span);
  } else if (feedback.grade === "diacritic") {
    const span = document.createElement("span"); span.className = "ok";
    span.appendChild(document.createTextNode("✓ Correct — mind the diacritics. Full answer: "));
    span.appendChild(target);
    fb.appendChild(span);
  } else if (feedback.grade === "typo") {
    const span = document.createElement("span"); span.className = "near";
    span.appendChild(document.createTextNode("≈ Near miss (counted as half). Correct form: "));
    span.appendChild(target);
    fb.appendChild(span);
  } else {
    const span = document.createElement("span"); span.className = "bad";
    span.appendChild(document.createTextNode(feedback.revealed ? "Answer: " : "✗ Not quite. Answer: "));
    span.appendChild(target);
    fb.appendChild(span);
  }
  return fb;
}

// Expandable paradigm for the current question's word: conjugation for verbs,
// full case table for adjectives/nouns. Hidden before answering in modes where
// the table would reveal the answer (conjugate/decline: the form IS the answer;
// en_es: the Polish word IS the answer).
function buildConjSection() {
  if (!currentQ) return null;
  const e = byId[currentQ.entryId];
  if (!e) return null;

  const isVerb = e.pos === "verb" && e.conjugation;
  const isNoun = e.pos === "noun" && e.noun_decl;
  const hasDecl = !!e.decl_table;
  if (!isVerb && !hasDecl && !isNoun) return null;
  if (!feedback && (currentQ.type === "conjugate" || currentQ.type === "decline" || currentQ.type === "noun_case" || currentQ.type === "cloze" || currentQ.type === "en_es")) return null;

  const wrap = document.createElement("div");
  wrap.className = "conj-section";
  const btn = document.createElement("button");
  btn.type = "button"; btn.className = "conj-toggle";
  const word = isVerb ? "conjugation" : (isNoun ? "forms" : "declension");
  btn.textContent = "Show " + word;
  const tbl = document.createElement("div");
  tbl.className = "conj-table";
  const lbl = document.createElement("div");
  lbl.className = "conj-label";

  if (isVerb) {
    lbl.textContent = e.es + " — " + (e.conjugation_label || "present");
    tbl.appendChild(lbl);
    Object.keys(e.conjugation).forEach(function(k) {
      const row = document.createElement("div"); row.className = "conj-row";
      const p = document.createElement("span"); p.className = "cp"; p.textContent = PRONOUN_LABELS[k];
      const f = document.createElement("span"); f.textContent = e.conjugation[k];
      row.appendChild(p); row.appendChild(f);
      tbl.appendChild(row);
    });
  } else if (isNoun) {
    lbl.textContent = e.es + (e.gender ? " — " + e.gender : "");
    tbl.appendChild(lbl);
    const rows = [["Nom sg", e.es]];
    if (e.noun_decl.acc_sg) rows.push(["Acc sg", e.noun_decl.acc_sg]);
    if (e.noun_decl.gen_sg) rows.push(["Gen sg", e.noun_decl.gen_sg]);
    if (e.noun_decl.nom_pl) rows.push(["Nom pl", e.noun_decl.nom_pl]);
    if (e.noun_decl.acc_pl) rows.push(["Acc pl", e.noun_decl.acc_pl]);
    if (e.noun_decl.gen_pl) rows.push(["Gen pl", e.noun_decl.gen_pl]);
    rows.forEach(function(pair) {
      const row = document.createElement("div"); row.className = "conj-row";
      const p = document.createElement("span"); p.className = "cp"; p.textContent = pair[0];
      const f = document.createElement("span"); f.textContent = pair[1];
      row.appendChild(p); row.appendChild(f);
      tbl.appendChild(row);
    });
  } else {
    lbl.textContent = e.es + (e.decl_note ? " — " + e.decl_note : "");
    tbl.appendChild(lbl);
    e.decl_table.forEach(function(pair) {
      const row = document.createElement("div"); row.className = "conj-row";
      const p = document.createElement("span"); p.className = "cp"; p.textContent = pair[0];
      const f = document.createElement("span"); f.textContent = pair[1];
      row.appendChild(p); row.appendChild(f);
      tbl.appendChild(row);
    });
  }

  btn.addEventListener("click", function() {
    const open = tbl.className.indexOf("open") >= 0;
    tbl.className = open ? "conj-table" : "conj-table open";
    btn.textContent = (open ? "Show " : "Hide ") + word;
  });
  wrap.appendChild(btn);
  wrap.appendChild(tbl);
  return wrap;
}

function buildChoiceSection() {
  const wrap = document.createElement("div");
  wrap.className = "mc-options";
  (currentQ.choices || []).forEach(function(opt, i) {
    const text = opt.text;
    const b = document.createElement("button");

    const num = document.createElement("span");
    num.className = "mc-num"; num.textContent = (i + 1) + ".";
    b.appendChild(num);
    b.appendChild(document.createTextNode(" " + text));
    if (feedback) {
      // Reveal what every option means — extra learning from the distractors
      if (opt.trans) {
        const gloss = document.createElement("span");
        gloss.className = "mc-gloss";
        gloss.textContent = " — " + opt.trans;
        b.appendChild(gloss);
      }
      if (text === currentQ.correct) b.className += " mc-correct";
      else if (text === feedback.userInput) b.className += " mc-wrong";
      b.addEventListener("click", function() { pickQuestion(true); });
    } else {
      b.addEventListener("click", function() { chooseOption(text); });
    }
    wrap.appendChild(b);
  });
  return wrap;
}

function chooseOption(text) {
  if (!currentQ || feedback || !currentQ.choices) return;
  const grade = text === currentQ.correct ? "exact" : "wrong";
  feedback = { grade: grade, target: currentQ.rawTarget, userInput: text };
  recordAnswer(grade);
  renderStats();
  renderCard();  // full re-render: multiple choice has no input to preserve
}

// Update the existing card in place after an answer, WITHOUT rebuilding the
// input. Keeping the same focused input means the phone keyboard stays open,
// so its return key can submit and then advance — no reaching for the screen.
function updateCardForFeedback() {
  const inputEl = document.getElementById("answer-input");
  if (!inputEl) { renderCard(); return; }
  inputEl.readOnly = true; // focusable (keyboard stays) but not editable
  inputEl.className = "g-" + feedback.grade;
  const card = inputEl.parentNode;
  const old = card.querySelectorAll(".actions, .actions-secondary, .actions-end");
  for (let i = 0; i < old.length; i++) card.removeChild(old[i]);
  const cnt = card.querySelector(".q-counter");
  if (cnt) cnt.textContent = (reviewMode ? "Review · Q " : "Q ") + session.count;
  const oldConj = card.querySelector(".conj-section");
  if (oldConj) card.removeChild(oldConj);
  card.appendChild(buildFeedbackEl());
  const conj = buildConjSection();
  if (conj) card.appendChild(conj);
  card.appendChild(buildNextActions());
  if (session.count > 0) card.appendChild(buildEndRow());
  inputEl.focus();
}

function renderCard(focusInput) {
  if (summaryShowing) return; // summary owns the card area
  const area = document.getElementById("card-area");
  area.innerHTML = "";

  if (!currentQ) {
    const empty = document.createElement("div");
    empty.className = "empty";
    const anyMode = Object.keys(enabledModes).some(function(m){ return enabledModes[m]; });
    const anyLesson = ALL_LESSONS.some(function(l){ return enabledLessons[l]; });
    empty.textContent = !anyLesson ? "Select at least one lesson to begin."
      : !anyMode ? "Select at least one drill type to begin."
      : "No words match the selected drill types and lessons.";
    area.appendChild(empty);
    return;
  }

  const card = document.createElement("div");
  card.className = "card";

  const head = document.createElement("div");
  head.className = "card-head";

  const counter = document.createElement("div");
  counter.className = "q-counter";
  counter.textContent = (reviewMode ? "Review · Q " : "Q ") + (feedback ? session.count : session.count + 1);
  head.appendChild(counter);

  const promptLabel = document.createElement("div");
  promptLabel.className = "prompt-label";
  promptLabel.textContent = currentQ.promptLabel;
  head.appendChild(promptLabel);

  card.appendChild(head);

  const prompt = document.createElement("div");
  prompt.className = "prompt";
  prompt.textContent = currentQ.prompt;
  if (currentQ.posHint) {
    const pos = document.createElement("span");
    pos.className = "pos";
    pos.textContent = "(" + currentQ.posHint + ")";
    prompt.appendChild(pos);
  }
  card.appendChild(prompt);

  if (currentQ.subPrompt) {
    const sub = document.createElement("div");
    sub.className = "prompt-sub";
    const revealHint = currentQ.hint && (currentQ.type !== "cloze" || clozeHintShown || feedback);
    if (revealHint) {
      sub.textContent = currentQ.subPrompt + "    ·    (" + currentQ.hint + ")";
    } else if (currentQ.hint && currentQ.type === "cloze") {
      sub.textContent = currentQ.subPrompt + "    ·    ";
      const link = document.createElement("button");
      link.type = "button";
      link.className = "hint-link";
      link.textContent = "Show hint";
      link.addEventListener("click", function() { clozeHintShown = true; renderCard(false); });
      sub.appendChild(link);
    } else {
      sub.textContent = currentQ.subPrompt;
    }
    card.appendChild(sub);
  }

  if (currentQ.choices) {
    card.appendChild(buildChoiceSection());
    if (feedback) {
      card.appendChild(buildFeedbackEl());
      const conj = buildConjSection();
      if (conj) card.appendChild(conj);
      card.appendChild(buildNextActions());
    }
    if (session.count > 0) card.appendChild(buildEndRow());
    area.appendChild(card);
    return;
  }

  const input = document.createElement("input");
  input.type = "text";
  input.id = "answer-input";
  input.placeholder = "Your answer in " + currentQ.answerLabel.toLowerCase() + "...";
  input.setAttribute("autocomplete", "off");
  input.setAttribute("autocorrect", "off");
  input.setAttribute("autocapitalize", "none");
  input.setAttribute("spellcheck", "false");
  input.spellcheck = false;
  if (feedback) {
    input.readOnly = true;
    input.value = feedback.userInput || "";
    input.className = "g-" + feedback.grade;
  }
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      e.stopPropagation();
      if (feedback) pickQuestion(true);
      else submit();
    }
  });
  card.appendChild(input);

  if (feedback) {
    card.appendChild(buildFeedbackEl());
  }

  const conjSection = buildConjSection();
  if (conjSection) card.appendChild(conjSection);

  if (!feedback) {
    const actions = document.createElement("div");
    actions.className = "actions";
    const check = document.createElement("button"); check.type = "button"; check.className = "btn-primary"; check.textContent = "Check (Enter)";
    check.addEventListener("click", submit);
    actions.appendChild(check);

    const secondary = document.createElement("div");
    secondary.className = "actions-secondary";
    const show = document.createElement("button"); show.type = "button"; show.className = "btn-ghost"; show.textContent = "Show answer";
    show.addEventListener("click", reveal);
    const skip = document.createElement("button"); skip.type = "button"; skip.className = "btn-ghost"; skip.textContent = "Skip";
    skip.addEventListener("click", function() { pickQuestion(false); });
    secondary.appendChild(show); secondary.appendChild(skip);
    card.appendChild(actions);
    card.appendChild(secondary);
  } else {
    card.appendChild(buildNextActions());
  }

  if (session.count > 0) {
    card.appendChild(buildEndRow());
  }

  area.appendChild(card);

  // Focus the input: synchronously when the user advanced via the keyboard
  // (keeps the phone keyboard open within the same keypress gesture);
  // otherwise only auto-focus on non-touch devices.
  if (!feedback) {
    if (focusInput) input.focus();
    else if (!("ontouchstart" in window)) setTimeout(function() { input.focus(); }, 0);
  }
}

// === EXPORT / IMPORT ===
function showMsg(text) {
  const m = document.getElementById("export-msg");
  m.textContent = text;
  setTimeout(() => { m.textContent = ""; }, 4000);
}

document.getElementById("btn-export").addEventListener("click", function() {
  const json = JSON.stringify(progress, null, 2);
  const date = new Date().toISOString().slice(0, 10);
  const filename = "polish-trainer-progress-" + date + ".json";

  // Try standard download approach
  try {
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showMsg("Saved as " + filename);
    return;
  } catch (e) {}

  // Fallback: new window with JSON
  try {
    const w = window.open("", "_blank");
    if (w) {
      w.document.open();
      w.document.write("<!doctype html><meta charset=\"utf-8\"><title>" + filename + "</title><pre style=\"font-family:monospace;white-space:pre-wrap;word-break:break-all;padding:16px\">" + json.replace(/[&<>]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[ch])) + "</pre>");
      w.document.close();
      showMsg("Opened in new tab.");
      return;
    }
  } catch (e) {}

  // Last resort: clipboard
  navigator.clipboard.writeText(json).then(function() { showMsg("Copied to clipboard."); });
});

document.getElementById("btn-copy").addEventListener("click", function() {
  try {
    var p = navigator.clipboard.writeText(JSON.stringify(progress, null, 2));
    if (p && p.then) p.then(function() { showMsg("Copied JSON to clipboard."); }, function() { showMsg("Clipboard blocked — try Export."); });
    else showMsg("Copied JSON to clipboard.");
  } catch (e) {
    showMsg("Clipboard blocked — try Export.");
  }
});

document.getElementById("file-import").addEventListener("change", function(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = function() {
    try {
      const data = JSON.parse(r.result);
      if (data && data.stats) {
        progress = data;
        saveProgress(progress);
        renderStats();
        showMsg("Progress restored.");
      } else {
        showMsg("Not a valid progress file.");
      }
    } catch (err) {
      showMsg("Could not read file.");
    }
  };
  r.readAsText(f);
});

document.getElementById("btn-reset").addEventListener("click", function() {
  if (!confirm("Clear all progress? This cannot be undone.")) return;
  progress = { stats: {}, history: [] };
  saveProgress(progress);
  renderStats();
  showMsg("Progress cleared.");
});

// === INIT ===
// Page-level Enter: advance to next question when feedback is showing
// (the input is disabled then, so its own keydown handler can't fire)
document.addEventListener("keydown", function(e) {
  // Number keys pick a multiple-choice option (before answering)
  if (currentQ && currentQ.choices && !feedback && !summaryShowing) {
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= (currentQ.choices || []).length) {
      e.preventDefault();
      chooseOption(currentQ.choices[n - 1].text);
      return;
    }
  }
  if (e.key !== "Enter") return;
  if (summaryShowing) {
    e.preventDefault();
    (summaryPrimaryAction || startNewRound)();
    return;
  }
  if (feedback && currentQ) {
    e.preventDefault();
    pickQuestion(true);
  }
});

try {
  renderStats();
  renderModes();
  renderLessons();
  pickQuestion();
  // If pickQuestion didn't replace "Loading…", surface that as a diagnostic
  setTimeout(function() {
    var area = document.getElementById("card-area");
    if (area && area.textContent.indexOf("Loading") >= 0) {
      area.innerHTML = "";
      var msg = document.createElement("div");
      msg.className = "empty";
      msg.innerHTML = "Trainer initialised, but no question was generated.<br>" +
        "Storage available: " + LS_AVAILABLE + "<br>" +
        "Vocab entries: " + (VOCAB_DATA && VOCAB_DATA.entries ? VOCAB_DATA.entries.length : "MISSING") + "<br>" +
        "Modes enabled: " + Object.keys(enabledModes).filter(function(m) { return enabledModes[m]; }).join(", ");
      area.appendChild(msg);
    }
  }, 500);
} catch (e) {
  var area = document.getElementById("card-area");
  if (area) {
    area.innerHTML = "";
    var msg = document.createElement("div");
    msg.className = "empty";
    msg.style.color = "#b43c28";
    msg.textContent = "INIT ERROR: " + (e && e.message ? e.message : e);
    area.appendChild(msg);
  }
}
</script>
